<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 100%; padding: 15px; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    h3 { color: #202124; margin-top: 0; }
    textarea { 
      width: 100%; 
      height: 80vh; 
      padding: 10px; 
      border: 1px solid #dadce0; 
      border-radius: 8px; 
      resize: none;
      font-size: 14px;
      box-sizing: border-box;
    }
    #status { font-size: 12px; color: #70757a; margin-bottom: 5px; }
    #dropZone {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border: 2px dashed #dadce0;
      border-radius: 8px;
      text-align: center;
      color: #70757a;
      font-size: 12px;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    #dropZone.drag-over {
      border-color: #1a73e8;
      background-color: #e8f0fe;
      color: #1a73e8;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .btn-row button {
      flex: 1;
      padding: 7px 10px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      box-sizing: border-box;
    }
    #clearBtn {
      background-color: #dadce0;
      color: #202124;
    }
    #clearBtn:hover { background-color: #bdc1c6; }
  </style>
</head>
<body>
  <h3>📝 Study Note</h3>
  <div id="status">텍스트 선택 → 우클릭 "📝 메모장에 추가" 또는 드래그하여 아래에 놓기</div>
  <div id="dropZone">📌 드래그한 텍스트를 여기에 놓으세요</div>
  <div class="btn-row">
    <button id="clearBtn">🗑️ 전체 지우기</button>
  </div>
  <textarea id="memo" placeholder="학습 내용을 여기에 기록하세요..."></textarea>
  <script src="sidepanel.js"></script>
</body>
</html>
